---
layout: default
---

<div class="posts">
  {% for post in site.posts %}
  
    <article class="post">
      
      <a href="{{ site.baseurl }}{{ post.url }}"><h1>{{ post.title }}</h1></a>

      <div style='color: #222' class="entry">
        
        <span class="post-tags">
          {% for tag in post.tags %}
            <a class="post-tag"
               href="{{ site.baseurl }}/tag/{{ tag | slugify }}"
               >{{ tag }}</a>
          {% endfor %}
        </span>
        <p></p>
        {{ post.content | markdownify | truncatewords: 48, " ..."}}<a href="{{ site.baseurl }}{{ post.url }}">read more</a>
      </div>
    
    
    </article>
  
  {% endfor %}
</div>
